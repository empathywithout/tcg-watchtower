<script>
// Inject mobile scroll hint above section nav on mobile only
(function() {
  function injectHint() {
    if (window.innerWidth > 768) return;
    const sectionNav = document.getElementById('section-nav');
    if (!sectionNav || document.getElementById('scroll-hint')) return;
    const hint = document.createElement('div');
    hint.className = 'scroll-hint';
    hint.id = 'scroll-hint';
    hint.innerHTML = '&#9660; Chase &nbsp;&middot;&nbsp; Cards &nbsp;&middot;&nbsp; Sets';
    hint.addEventListener('click', function() {
      hint.classList.add('hidden');
      sectionNav.scrollIntoView({ behavior: 'smooth' });
    });
    sectionNav.parentNode.insertBefore(hint, sectionNav);
  }
  // Run after nav is injected and page has rendered
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectHint);
  } else {
    setTimeout(injectHint, 100);
  }
})();

// Convert any blocking Google Fonts link to async (fixes LCP/FCP on existing pages)
(function() {
  document.querySelectorAll('link[rel="stylesheet"][href*="fonts.googleapis.com"]').forEach(function(link) {
