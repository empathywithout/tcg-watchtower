<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Admin | TCG Watchtower</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Saira+Condensed:wght@600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#3b82f6;--purple:#a855f7;--amber:#fbbf24;--green:#4ade80;--red:#f87171;--dark:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(to bottom right,#0f172a,#1e1b4b,#581c87);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(to right,rgba(59,130,246,.06) 1px,transparent 1px),linear-gradient(to bottom,rgba(59,130,246,.06) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.container{max-width:1200px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

/* STATES */
.center-state{display:flex;align-items:center;justify-content:center;min-height:100vh}
.state-box{background:rgba(30,41,59,.8);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:40px;text-align:center;max-width:400px;width:100%}
.state-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;margin-bottom:8px}
.state-sub{color:var(--muted);font-size:.9rem;margin-bottom:24px;line-height:1.6}
.btn-discord{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#5865f2,#4752c4);color:white;border:none;border-radius:10px;padding:14px 28px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(88,101,242,.4)}
.btn-discord:hover{opacity:.9;transform:translateY(-1px)}

/* MAIN */
#main{display:none}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:0}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#f1f5f9;text-decoration:none;letter-spacing:.04em}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-user{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--muted)}
.nav-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(168,85,247,.4)}
.nav-back{color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:500;transition:color .2s}
.nav-back:hover{color:var(--text)}

.page-header{padding:40px 0 32px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:32px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;margin-bottom:6px}
.gradient-text{background:linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.page-meta-text{color:var(--muted);font-size:.82rem}
.refresh-btn{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;padding:6px 14px;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.refresh-btn:hover{background:rgba(59,130,246,.25)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:rgba(30,41,59,.7);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px}
.stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px;font-weight:700}
.stat-val{font-family:'Space Mono',monospace;font-size:1.8rem;font-weight:700;color:white;line-height:1}
.stat-val.green{color:var(--green)}
.stat-val.blue{color:#60a5fa}
.stat-val.amber{color:var(--amber)}
.stat-val.purple{color:#c084fc}
.stat-sub{font-size:.72rem;color:var(--muted);margin-top:6px;line-height:1.4}

.section{margin-bottom:36px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;margin-bottom:16px;color:var(--muted);letter-spacing:.04em}

.activity-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;background:rgba(30,41,59,.5);border-radius:12px;overflow:hidden}
.data-table th{padding:12px 16px;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.06);font-weight:700}
.data-table td{padding:12px 16px;font-size:.88rem;border-bottom:1px solid rgba(255,255,255,.04)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,.03)}
.bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:5px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:3px}

/* LOADING */
.loading{text-align:center;padding:80px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#60a5fa;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* NOTES */
.notes-box{background:rgba(30,41,59,.4);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:32px}
.notes-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.notes-list{color:var(--muted);font-size:.82rem;line-height:1.9;padding-left:16px}
code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;font-family:'Space Mono',monospace;font-size:.8em}

@media(max-width:640px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .activity-grid{grid-template-columns:1fr}
  .page-title{font-size:2rem}
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- NOT LOGGED IN -->
<div class="center-state" id="state-login" style="display:none">
  <div class="state-box">
    <div class="state-title">Admin <span style="color:#60a5fa">Login</span></div>
    <p class="state-sub">Sign in with your Discord account to access the portfolio analytics dashboard.</p>
    <a href="/api/auth/discord?redirect=/admin/portfolio" class="btn-discord">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.024.016.047.04.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      Sign in with Discord
    </a>
  </div>
</div>

<!-- NOT AUTHORIZED -->
<div class="center-state" id="state-unauth" style="display:none">
  <div class="state-box">
    <div class="state-title" style="color:var(--red)">Access Denied</div>
    <p class="state-sub">This dashboard is restricted to the site owner.</p>
    <a href="/" style="color:#60a5fa;font-size:.9rem">← Back to TCG Watchtower</a>
  </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="main">
  <div class="container">
    <nav>
      <a href="/" class="nav-logo">TCG Watchtower</a>
      <div class="nav-right">
        <div class="nav-user">
          <img id="nav-avatar" class="nav-avatar" src="" alt="">
          <span id="nav-username"></span>
        </div>
        <a href="/portfolio" class="nav-back">← Portfolio</a>
      </div>
    </nav>

    <div class="page-header">
      <h1 class="page-title">Portfolio <span class="gradient-text">Analytics</span></h1>
      <div class="page-meta">
        <span class="page-meta-text" id="generated-at">Loading…</span>
        <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
      </div>
    </div>

    <div id="dashboard-content">
      <div class="loading"><div class="spinner"></div>Loading analytics…</div>
    </div>
  </div>
</div>

<script>
async function init() {
  // Check session
  const meRes = await fetch('/api/auth/me');
  if (!meRes.ok) {
    document.getElementById('state-login').style.display = 'flex';
    return;
  }

  const user = await meRes.json();

  // Check owner
  if (user.id !== '397593147397636099') {
    document.getElementById('state-unauth').style.display = 'flex';
    return;
  }

  // Show dashboard
  document.getElementById('main').style.display = 'block';
  const avatarUrl = user.avatar
    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=64`
    : `https://cdn.discordapp.com/embed/avatars/0.png`;
  document.getElementById('nav-avatar').src     = avatarUrl;
  document.getElementById('nav-username').textContent = user.username;

  await loadStats();
}

async function loadStats() {
  document.getElementById('dashboard-content').innerHTML = '<div class="loading"><div class="spinner"></div>Loading analytics…</div>';
  try {
    const res  = await fetch('/api/admin/stats');
    if (res.status === 401) { location.reload(); return; }
    const data = await res.json();
    renderDashboard(data);
  } catch (e) {
    document.getElementById('dashboard-content').innerHTML = `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }
}

document.getElementById('refresh-btn')?.addEventListener('click', loadStats);

function renderDashboard(d) {
  const u = d.users       || {};
  const e = d.engagement  || {};
  const topSets = d.topSets || [];

  document.getElementById('generated-at').textContent = `Updated ${new Date(d.generatedAt).toLocaleString()}`;

  document.getElementById('dashboard-content').innerHTML = `

    <div class="section">
      <div class="section-title">Users</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Users</div>
          <div class="stat-val blue">${fmt(u.total)}</div>
          <div class="stat-sub">${fmt(u.withCards)} with cards · ${fmt(u.discord||0)} Discord · ${fmt(u.google||0)} Google</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">New — Last 7 days</div>
          <div class="stat-val green">${fmt(u.active7d)}</div>
          <div class="stat-sub">${pct(u.active7d, u.total)}% of all users</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">New — Last 30 days</div>
          <div class="stat-val green">${fmt(u.active30d)}</div>
          <div class="stat-sub">${pct(u.active30d, u.total)}% of all users</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Empty Portfolios</div>
          <div class="stat-val">${fmt(u.empty)}</div>
          <div class="stat-sub">${pct(u.empty, u.total)}% signed up, not tracking</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Activity</div>
      <div class="activity-grid">
        <div class="stat-card">
          <div class="stat-label">Daily Active Users</div>
          <div class="stat-val purple">${fmt(e.dau)}</div>
          <div class="stat-sub">Unique visitors today</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Weekly Active Users</div>
          <div class="stat-val purple">${fmt(e.wau)}</div>
          <div class="stat-sub">Unique visitors this week</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Monthly Active Users</div>
          <div class="stat-val purple">${fmt(e.mau)}</div>
          <div class="stat-sub">Unique visitors this month</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Engagement</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Cards Tracked</div>
          <div class="stat-val amber">${fmt(e.totalCards)}</div>
          <div class="stat-sub">Across all portfolios</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Cards / User</div>
          <div class="stat-val amber">${e.avgCardsPerUser || '—'}</div>
          <div class="stat-sub">Among users with cards</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Logins</div>
          <div class="stat-val">${fmt(e.totalLogins)}</div>
          <div class="stat-sub">All-time Discord logins</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Top Tracked Sets</div>
      ${topSets.length === 0
        ? '<div style="color:var(--muted);padding:20px 0">No card data yet</div>'
        : `<table class="data-table">
            <thead><tr><th>#</th><th>Set</th><th>Cards Tracked</th><th>Share</th></tr></thead>
            <tbody>${topSets.map((s, i) => {
              const barW = Math.round((s.count / (topSets[0]?.count||1)) * 100);
              return `<tr>
                <td style="color:var(--muted);font-family:'Space Mono',monospace;font-size:.8rem">${i+1}</td>
                <td><strong>${s.setId.toUpperCase()}</strong></td>
                <td><div>${fmt(s.count)}</div><div class="bar"><div class="bar-fill" style="width:${barW}%"></div></div></td>
                <td style="color:var(--muted)">${pct(s.count, e.totalCards)}%</td>
              </tr>`;
            }).join('')}</tbody>
          </table>`
      }
    </div>

    <div class="notes-box">
      <div class="notes-title">Notes</div>
      <ul class="notes-list">
        <li>DAU/WAU/MAU counters start from first deployment of the tracking endpoint</li>
        <li>Portfolio value is fetched client-side per session — not stored server-side</li>
        <li>Premium tracking: add a <code>premium:{userId}</code> Redis key on upgrade, scan for it here</li>
        <li>"New users" based on <code>updatedAt</code> — first save timestamp after signup</li>
      </ul>
    </div>
  `;
}

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString();
}
function pct(n, total) {
  if (!total || !n) return '0';
  return ((n / total) * 100).toFixed(1);
}

init();
</script>
</body>
</html>
