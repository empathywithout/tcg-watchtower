<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary-blue:#3b82f6;
  --primary-purple:#a855f7;
  --accent-amber:#fbbf24;
  --accent-green:#4ade80;
  --dark-bg:#0f172a;
  --dark-card:#1e293b;
  --text-light:#e2e8f0;
  --text-muted:#94a3b8;
  --text-primary:#f1f5f9;
}
body {
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(to bottom right,#0f172a,#1e1b4b,#581c87);
  color:var(--text-light);
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
}
.bg-grid {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:50px 50px;
}
.orb { position:fixed; border-radius:50%; filter:blur(60px); opacity:0.25; pointer-events:none; z-index:0; }
.orb-1 { width:600px; height:600px; background:#3b82f6; top:-200px; right:-100px; }
.orb-2 { width:400px; height:400px; background:#a855f7; bottom:10%; left:-100px; }

/* NAV */
nav {
  position:sticky; top:0; z-index:100;
  background:rgba(10,15,30,0.92); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:0 24px;
  display:flex; align-items:center; justify-content:space-between;
  max-width:100%; height:60px;
}
.nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.nav-logo img { width:32px; height:32px; border-radius:8px; object-fit:cover; }
.nav-logo span { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; color:var(--text-primary); letter-spacing:0.05em; }
.nav-links { display:flex; align-items:center; gap:20px; }
.nav-links a { color:var(--text-muted); text-decoration:none; font-size:0.85rem; font-weight:500; transition:color 0.2s; }
.nav-links a:hover { color:var(--text-primary); }
.btn-discord {
  padding:8px 16px; background:rgba(88,101,242,0.2); border:1px solid rgba(88,101,242,0.4);
  color:#818cf8; border-radius:8px; text-decoration:none; font-size:0.8rem; font-weight:700;
  transition:all 0.2s;
}
.btn-discord:hover { background:rgba(88,101,242,0.35); color:#a5b4fc; }

/* HERO */
.hero {
  position:relative; z-index:1;
  padding:80px 24px 60px;
  text-align:center;
  max-width:900px; margin:0 auto;
}
.hero-label {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(168,85,247,0.15); border:1px solid rgba(168,85,247,0.3);
  color:#c084fc; border-radius:20px; padding:6px 14px;
  font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em;
  margin-bottom:20px;
}
.hero h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,8vw,5.5rem);
  line-height:0.95;
  color:#fff;
  margin-bottom:20px;
}
.hero h1 span { color:var(--primary-blue); }
.hero p { color:var(--text-muted); font-size:1.1rem; max-width:600px; margin:0 auto; }

/* FILTER TABS */
.filter-bar {
  position:relative; z-index:1;
  display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
  padding:0 24px 40px;
}
.filter-tab {
  padding:8px 18px; border-radius:20px;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  color:var(--text-muted); font-size:0.8rem; font-weight:700;
  cursor:pointer; transition:all 0.2s; font-family:inherit;
  text-transform:uppercase; letter-spacing:0.06em;
}
.filter-tab:hover { background:rgba(255,255,255,0.1); color:var(--text-primary); }
.filter-tab.active {
  background:rgba(59,130,246,0.2); border-color:rgba(59,130,246,0.5);
  color:var(--primary-blue);
}

/* SETS GRID */
.sets-section {
  position:relative; z-index:1;
  max-width:1300px; margin:0 auto;
  padding:0 24px 80px;
}
.series-label {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem; letter-spacing:0.08em;
  color:var(--text-muted);
  margin-bottom:16px; margin-top:40px;
  padding-bottom:8px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.series-label:first-child { margin-top:0; }
.sets-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
  margin-bottom:8px;
}
.set-card {
  position:relative;
  background:rgba(30,41,59,0.7); backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08); border-radius:16px;
  overflow:hidden; transition:transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  text-decoration:none; color:var(--text-primary);
  display:flex; flex-direction:column;
}
.set-card:hover {
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(59,130,246,0.2);
  border-color:rgba(59,130,246,0.3);
}
.set-card.coming-soon {
  opacity:0.5; pointer-events:none; cursor:default;
}
.set-card-logo {
  background:rgba(15,23,42,0.6);
  display:flex; align-items:center; justify-content:center;
  padding:28px 24px;
  height:120px;
}
.set-card-logo img { max-width:160px; max-height:64px; object-fit:contain; }
.set-card-body { padding:16px 20px 20px; flex:1; display:flex; flex-direction:column; gap:8px; }
.set-card-name { font-size:1rem; font-weight:700; }
.set-card-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.set-badge {
  font-size:0.7rem; font-weight:700; padding:3px 8px; border-radius:6px;
  text-transform:uppercase; letter-spacing:0.06em;
}
.badge-live { background:rgba(74,222,128,0.15); color:#4ade80; border:1px solid rgba(74,222,128,0.3); }
.badge-soon { background:rgba(148,163,184,0.1); color:var(--text-muted); border:1px solid rgba(148,163,184,0.2); }
.set-card-date { font-size:0.75rem; color:var(--text-muted); }
.set-card-cta {
  margin-top:auto; padding-top:12px;
  display:flex; align-items:center; justify-content:space-between;
  font-size:0.8rem; font-weight:700; color:var(--primary-blue);
}
.set-card-cta .arrow { transition:transform 0.2s; }
.set-card:hover .set-card-cta .arrow { transform:translateX(4px); }
.coming-soon-tag {
  position:absolute; top:12px; right:12px;
  background:rgba(148,163,184,0.15); border:1px solid rgba(148,163,184,0.2);
  color:var(--text-muted); font-size:0.65rem; font-weight:700;
  text-transform:uppercase; letter-spacing:0.08em;
  padding:3px 8px; border-radius:6px;
}

/* FOOTER */
footer {
  position:relative; z-index:1;
  text-align:center; padding:40px 24px;
  border-top:1px solid rgba(255,255,255,0.06);
  color:var(--text-muted); font-size:0.8rem;
}
footer a { color:var(--text-muted); text-decoration:none; }
footer a:hover { color:var(--text-primary); }

/* EMPTY STATE */
.empty-state { text-align:center; padding:80px 24px; color:var(--text-muted); }

@media (max-width:640px) {
  .sets-grid { grid-template-columns:1fr 1fr; gap:12px; }
  .hero { padding:60px 24px 40px; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <a href="/" class="nav-logo">
    <img src="/tcg-watchtower-logo.jpg" alt="TCG Watchtower">
    <span>TCG Watchtower</span>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="https://discord.gg/cZxJV9YRyb" class="btn-discord">Join Discord</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">📋 Set Guides</div>
  <h1>Pokémon TCG<br><span>Set Guides</span></h1>
  <p>Complete card lists, chase cards ranked by market price, and sealed product guides for every set.</p>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="filter-tab active" data-filter="all">All Sets</button>
  <button class="filter-tab" data-filter="live">Available Now</button>
</div>

<div class="sets-section" id="sets-section">
  <div class="empty-state">Loading sets...</div>
</div>

<footer>
  <p>© 2024 TCG Watchtower · <a href="/privacy-policy">Privacy Policy</a> · <a href="/terms-of-service">Terms of Service</a> · <a href="/disclaimer">Disclaimer</a></p>
</footer>

<script>
let allSets = [];
let currentFilter = 'all';

async function loadSets() {
  try {
    const res = await fetch('/sets.json');
    allSets = await res.json();

    // Add series filter buttons dynamically
    const series = [...new Set(allSets.map(s => s.series))];
    const bar = document.getElementById('filter-bar');
    series.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'filter-tab';
      btn.dataset.filter = s;
      btn.textContent = s;
      bar.appendChild(btn);
    });

    renderSets();
  } catch(e) {
    document.getElementById('sets-section').innerHTML = '<div class="empty-state">Could not load sets. Please try again.</div>';
  }
}

function renderSets() {
  const container = document.getElementById('sets-section');
  let filtered = allSets;
  if (currentFilter === 'live') filtered = allSets.filter(s => s.live);
  else if (currentFilter !== 'all') filtered = allSets.filter(s => s.series === currentFilter);

  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state">No sets found.</div>';
    return;
  }

  // Group by series
  const grouped = {};
  filtered.forEach(s => {
    if (!grouped[s.series]) grouped[s.series] = [];
    grouped[s.series].push(s);
  });

  let html = '';
  Object.entries(grouped).forEach(([series, sets]) => {
    html += `<div class="series-label">${series}</div><div class="sets-grid">`;
    sets.forEach(s => {
      const TCGDEX_ID = {'sv3pt5':'sv03.5','sv4pt5':'sv04.5','sv6pt5':'sv06.5','sv8pt5':'sv08.5'}[s.setId] || s.setId;
      const logoUrl = s.setId ? `https://assets.tcgdex.net/en/sv/${TCGDEX_ID}/logo.png` : '';
      const isLive = s.live;
      html += `
        <a href="${isLive ? '/' + s.slug : 'javascript:void(0)'}" class="set-card${isLive ? '' : ' coming-soon'}">
          ${!isLive ? '<div class="coming-soon-tag">Coming Soon</div>' : ''}
          <div class="set-card-logo">
            ${logoUrl ? `<img src="${logoUrl}" alt="${s.name}" onerror="this.parentElement.innerHTML='<span style=font-size:2rem>🃏</span>'">` : '<span style="font-size:2rem">🃏</span>'}
          </div>
          <div class="set-card-body">
            <div class="set-card-name">${s.name}</div>
            <div class="set-card-meta">
              <span class="set-badge ${isLive ? 'badge-live' : 'badge-soon'}">${s.short || s.series}</span>
              ${s.releaseDate ? `<span class="set-card-date">${s.releaseDate}</span>` : ''}
            </div>
            ${isLive ? `<div class="set-card-cta"><span>View Full Guide</span><span class="arrow">→</span></div>` : ''}
          </div>
        </a>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

// Filter buttons
document.getElementById('filter-bar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-tab');
  if (!btn) return;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderSets();
});

loadSets();
</script>
</body>
</html>
