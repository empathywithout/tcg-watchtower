name: Generate Card Pages
on:
  workflow_dispatch:
    inputs:
      set_id:
        description: 'Set ID (e.g. sv07)'
        required: true
      set_full_name:
        description: 'Full set name (e.g. Stellar Crown (SV7))'
        required: true
      set_slug:
        description: 'Set slug for URL (e.g. stellar-crown)'
        required: true
      set_slug_full:
        description: 'Full slug for file (e.g. stellar-crown-card-list)'
        required: true
      set_series_slug:
        description: 'Series slug for URL (e.g. scarlet-violet or mega-evolution)'
        required: false
        default: 'scarlet-violet'
      set_series:
        description: 'Series display name (e.g. Scarlet & Violet)'
        required: false
        default: 'Scarlet & Violet'
      set_short:
        description: 'Short badge label (e.g. SV7, ME1, PRE)'
        required: false
        default: ''
      set_release_date:
        description: 'Release date (e.g. March 28, 2025) — optional'
        required: false
        default: ''
      tcgp_group_id:
        description: 'TCGplayer group ID for prices'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Clean old generated pages
        env:
          SET_SLUG: ${{ github.event.inputs.set_slug }}
          SET_SERIES_SLUG: ${{ github.event.inputs.set_series_slug || 'scarlet-violet' }}
        run: |
          DIR="pokemon/sets/${SET_SERIES_SLUG}/${SET_SLUG}"
          echo "Cleaning $DIR"
          rm -rf "$DIR"
          git rm -r --cached --ignore-unmatch "$DIR"
          echo "Done cleaning"

      - name: Generate card pages
        env:
          SET_ID: ${{ github.event.inputs.set_id }}
          SET_FULL_NAME: ${{ github.event.inputs.set_full_name }}
          SET_SLUG: ${{ github.event.inputs.set_slug }}
          SET_SLUG_FULL: ${{ github.event.inputs.set_slug_full }}
          SET_SERIES_SLUG: ${{ github.event.inputs.set_series_slug }}
          SET_SERIES: ${{ github.event.inputs.set_series }}
          TCGP_GROUP_ID: ${{ github.event.inputs.tcgp_group_id }}
          CF_R2_PUBLIC_URL: ${{ secrets.CF_R2_PUBLIC_URL }}
        run: node scripts/generate-card-pages.js

      - name: Update sets.json
        env:
          SET_ID: ${{ github.event.inputs.set_id }}
          SET_FULL_NAME: ${{ github.event.inputs.set_full_name }}
          SET_SLUG: ${{ github.event.inputs.set_slug }}
          SET_SERIES_SLUG: ${{ github.event.inputs.set_series_slug || 'scarlet-violet' }}
          SET_SERIES: ${{ github.event.inputs.set_series || 'Scarlet & Violet' }}
          SET_SHORT: ${{ github.event.inputs.set_short }}
          SET_RELEASE_DATE: ${{ github.event.inputs.set_release_date }}
        run: node scripts/update-sets-json.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "=== Untracked files ==="
          git ls-files --others --exclude-standard | head -20
          echo "=== Modified files ==="
          git ls-files --modified | head -20
          echo "=== Deleted files ==="
          git ls-files --deleted | head -20
          git add -A
          git status
          if git diff --cached --quiet; then
            echo "⚠️ Nothing to commit — all files already up to date"
          else
            git commit -m "Generate card pages for ${{ github.event.inputs.set_full_name }}"
            git push origin main
            echo "✅ Committed and pushed"
          fi
