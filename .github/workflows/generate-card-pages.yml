name: Generate Card Pages
on:
  workflow_dispatch:
    inputs:
      set_id:
        description: 'Set ID (e.g. sv07)'
        required: true
      set_full_name:
        description: 'Full set name (e.g. Stellar Crown (SV7))'
        required: true
      set_slug:
        description: 'Set slug for URL (e.g. stellar-crown)'
        required: true
      set_slug_full:
        description: 'Full slug for file (e.g. stellar-crown-card-list)'
        required: true
      set_series_slug:
        description: 'Series slug for URL (e.g. scarlet-violet or mega-evolution)'
        required: false
        default: 'scarlet-violet'
      set_series:
        description: 'Series display name (e.g. Scarlet & Violet)'
        required: false
        default: 'Scarlet & Violet'
      set_short:
        description: 'Short badge label (e.g. SV7, ME1, PRE)'
        required: false
        default: ''
      set_release_date:
        description: 'Release date (e.g. March 28, 2025) — optional'
        required: false
        default: ''
      tcgp_group_id:
        description: 'TCGplayer group ID for prices (leave blank for phase=jp)'
        required: false
      phase:
        description: 'Phase: en (default), jp (JP-only from Scrydex), or presale (TCGCSV bridge: EN card data + TCGplayer presale prices + JP estimate fallback)'
        required: false
        default: 'en'
      jp_scrydex_id:
        description: 'Scrydex JP expansion ID (required if phase=jp, e.g. m5_ja) — confirm via /api/admin/scrydex-expansions-jp, never guess'
        required: false
        default: ''
      set_official_count:
        description: 'Official card count override (optional, useful for phase=jp if Scrydex data is incomplete pre-release)'
        required: false
        default: ''
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Seed R2 with EN card data (presale phase only)
        if: ${{ github.event.inputs.phase == 'presale' }}
        env:
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          SET_ID: ${{ github.event.inputs.set_id }}
          SET_OFFICIAL_COUNT: ${{ github.event.inputs.set_official_count }}
        run: |
          node --input-type=module -e "
            import { S3Client, PutObjectCommand } from '@aws-sdk/client-s3';

            const setId = process.env.SET_ID;
            const officialCount = parseInt(process.env.SET_OFFICIAL_COUNT || '0', 10) || null;

            const res = await fetch('https://tcgwatchtower.com/api/cards?set=' + setId);
            if (!res.ok) throw new Error('API fetch failed: ' + res.status);
            const data = await res.json();
            console.log('Fetched', data.cards?.length, 'cards for', setId, 'phase:', data.phase);
            if (!data.cards?.length) throw new Error('No cards returned');
            if (data.cards.length < 50) throw new Error('Too few cards: ' + data.cards.length);

            const metadata = {
              id: setId,
              phase: 'en',
              cardCount: {
                official: officialCount || data.cardCount?.total || data.cards.length,
                total: data.cards.length
              },
              cards: data.cards.map(c => ({
                localId: c.localId,
                name: c.name,
                rarity: c.rarity,
                image: c.image,
                denominator: c.denominator || String(officialCount || data.cards.length).padStart(3, '0'),
              })),
            };
            console.log('Sample cards (first 3):');
            metadata.cards.slice(0, 3).forEach(c =>
              console.log(' ', c.localId, c.name, c.rarity, 'denom:', c.denominator)
            );

            const s3 = new S3Client({
              region: 'auto',
              endpoint: process.env.CF_R2_ENDPOINT,
              credentials: {
                accessKeyId: process.env.CF_R2_ACCESS_KEY,
                secretAccessKey: process.env.CF_R2_SECRET_KEY,
              },
            });
            await s3.send(new PutObjectCommand({
              Bucket: process.env.CF_R2_BUCKET,
              Key: 'data/' + setId + '.json',
              Body: JSON.stringify(metadata),
              ContentType: 'application/json',
              CacheControl: 'public, max-age=3600',
            }));
            console.log('R2 seed complete for', setId);
          "
      - name: Generate card pages
        env:
          SET_ID: ${{ github.event.inputs.set_id }}
          SET_FULL_NAME: ${{ github.event.inputs.set_full_name }}
          SET_SLUG: ${{ github.event.inputs.set_slug }}
          SET_SLUG_FULL: ${{ github.event.inputs.set_slug_full }}
          SET_SERIES_SLUG: ${{ github.event.inputs.set_series_slug }}
          SET_SERIES: ${{ github.event.inputs.set_series }}
          TCGP_GROUP_ID: ${{ github.event.inputs.tcgp_group_id }}
          CF_R2_PUBLIC_URL: ${{ secrets.CF_R2_PUBLIC_URL }}
          PHASE: ${{ github.event.inputs.phase }}
          JP_SCRYDEX_ID: ${{ github.event.inputs.jp_scrydex_id }}
          SET_OFFICIAL_COUNT: ${{ github.event.inputs.set_official_count }}
          SCRYDEX_API_KEY: ${{ secrets.SCRYDEX_API_KEY }}
          SCRYDEX_TEAM_ID: ${{ secrets.SCRYDEX_TEAM_ID }}
        run: node scripts/generate-card-pages.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "=== Untracked files ==="
          git ls-files --others --exclude-standard | head -20
          echo "=== Modified files ==="
          git ls-files --modified | head -20
          echo "=== Deleted files ==="
          git ls-files --deleted | head -20
          git add -A
          git status
          if git diff --cached --quiet; then
            echo "⚠️ Nothing to commit — all files already up to date"
          else
            git commit -m "Generate card pages for ${{ github.event.inputs.set_full_name }}"
            git push origin main
            echo "✅ Committed and pushed"
          fi
