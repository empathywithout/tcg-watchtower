name: Fix gtag(set) Bug (Corrective Patch)
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (report what would happen, patch nothing)'
        required: true
        type: boolean
        default: true
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run corrective patch
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python3 scripts/patch_fix_gtag_set.py --dry-run
          else
            python3 scripts/patch_fix_gtag_set.py
          fi
      - name: Commit and push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "⚠️ Nothing to commit"
          else
            git commit -m "Fix gtag(set) bug: move custom dimensions into config() call"
            git push origin main
            echo "✅ Committed and pushed"
          fi
