name: Regenerate Pitch Black Individual Card Pages
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not commit/push, and do not remove old files)'
        required: true
        type: boolean
        default: true
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Capture list of existing individual card files (before generation)
        run: |
          ls pokemon/sets/mega-evolution/pitch-black/cards/ > /tmp/before_list.txt
          echo "Captured $(wc -l < /tmp/before_list.txt) existing files before regeneration"
      - name: Generate individual card pages for Pitch Black (me05)
        env:
          SET_ID: me05
          SET_FULL_NAME: Pitch Black
          SET_SERIES: Mega Evolution
          SET_SERIES_SLUG: mega-evolution
          SET_SLUG: pitch-black
          SET_SLUG_FULL: pitch-black-card-list
          PHASE: presale
          TCGP_GROUP_ID: '24688'
          CF_R2_PUBLIC_URL: ${{ secrets.CF_R2_PUBLIC_URL }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          SCRYDEX_API_KEY: ${{ secrets.SCRYDEX_API_KEY }}
          SCRYDEX_TEAM_ID: ${{ secrets.SCRYDEX_TEAM_ID }}
        run: node scripts/generate-card-pages.js
      - name: Identify orphaned old files (present before, NOT newly created by this run)
        run: |
          DIR="pokemon/sets/mega-evolution/pitch-black/cards"
          # Real fix: the previous version checked "does this old filename
          # still exist on disk", which is trivially always true since the
          # generator never deletes anything -- that's why it reported 0
          # orphans against 118 real old files. The correct check is
          # "was THIS filename newly created by THIS run" (git status '??'
          # = untracked = new), not "does a file with this name exist
          # somewhere". Any old file NOT in the '??' set is genuinely
          # orphaned; if an old filename coincidentally matches a new one,
          # git shows it as modified ('M') rather than untracked, and it's
          # correctly left alone (it's a real update, not an orphan) --
          # verified this reasoning against the confirmed real data (old
          # files aren't zero-padded, new ones are, so zero collisions
          # actually occur for this specific set).
          echo "=== Orphaned old files (present before, not part of this run's new output) ==="
          removed=0
          while IFS= read -r fname; do
            [ -z "$fname" ] && continue
            f="$DIR/$fname"
            status=$(git status --porcelain -- "$f")
            if [[ "$status" != "??"* ]]; then
              # Not newly created by this run's generation -- if it's also
              # not shown as modified in place, it's untouched old content,
              # genuinely orphaned by the new numbering.
              if [[ -z "$status" ]]; then
                echo "  $fname"
                removed=$((removed+1))
                if [ "${{ inputs.dry_run }}" = "false" ]; then
                  git rm -q "$f"
                fi
              fi
            fi
          done < /tmp/before_list.txt
          echo "=== Total: $removed orphaned file(s) $([ '${{ inputs.dry_run }}' = 'false' ] && echo 'removed' || echo 'would be removed (dry run)') ==="
      - name: Show what changed
        run: git status --short
      - name: Commit and push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "⚠️ Nothing to commit"
          else
            git commit -m "Regenerate Pitch Black individual card pages with presale EN prices"
            git push origin main
            echo "✅ Committed and pushed"
          fi
