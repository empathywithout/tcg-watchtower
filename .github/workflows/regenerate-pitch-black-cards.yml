name: Regenerate Pitch Black Individual Card Pages
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not commit/push, and do not remove old files)'
        required: true
        type: boolean
        default: true
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Seed R2 with correct EN card data from live API
        env:
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
        run: |
          node --input-type=module -e "
            import { S3Client, PutObjectCommand } from '@aws-sdk/client-s3';

            const res = await fetch('https://tcgwatchtower.com/api/cards?set=me05');
            if (!res.ok) throw new Error('API fetch failed: ' + res.status);
            const data = await res.json();
            console.log('Fetched', data.cards?.length, 'cards, phase:', data.phase);
            if (!data.cards?.length) throw new Error('No cards returned');
            if (data.cards.length < 118) throw new Error('Too few cards: ' + data.cards.length);

            const metadata = {
              id: 'me05',
              phase: 'en',
              cardCount: { official: data.cardCount?.total || data.cards.length, total: data.cards.length },
              cards: data.cards.map(c => ({ localId: c.localId, name: c.name, rarity: c.rarity })),
            };
            console.log('Writing data/me05.json to R2 with', metadata.cards.length, 'cards');
            console.log('Sample:', JSON.stringify(metadata.cards.slice(108, 113)));

            const s3 = new S3Client({
              region: 'auto',
              endpoint: process.env.CF_R2_ENDPOINT,
              credentials: {
                accessKeyId: process.env.CF_R2_ACCESS_KEY,
                secretAccessKey: process.env.CF_R2_SECRET_KEY,
              },
            });
            await s3.send(new PutObjectCommand({
              Bucket: process.env.CF_R2_BUCKET,
              Key: 'data/me05.json',
              Body: JSON.stringify(metadata),
              ContentType: 'application/json',
              CacheControl: 'public, max-age=3600',
            }));
            console.log('R2 seed complete');
          "
      - name: Capture list of existing individual card files (before generation)
        run: |
          ls pokemon/sets/mega-evolution/pitch-black/cards/ > /tmp/before_list.txt
          echo "Captured $(wc -l < /tmp/before_list.txt) existing files before regeneration"
      - name: Generate individual card pages for Pitch Black (me05)
        env:
          SET_ID: me05
          SET_FULL_NAME: Pitch Black
          SET_SERIES: Mega Evolution
          SET_SERIES_SLUG: mega-evolution
          SET_SLUG: pitch-black
          SET_SLUG_FULL: pitch-black-card-list
          PHASE: presale
          TCGP_GROUP_ID: '24688'
          CF_R2_PUBLIC_URL: ${{ secrets.CF_R2_PUBLIC_URL }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          SCRYDEX_API_KEY: ${{ secrets.SCRYDEX_API_KEY }}
          SCRYDEX_TEAM_ID: ${{ secrets.SCRYDEX_TEAM_ID }}
        run: node scripts/generate-card-pages.js
      - name: Identify orphaned old files (present before, NOT newly created by this run)
        run: |
          DIR="pokemon/sets/mega-evolution/pitch-black/cards"
          echo "=== Orphaned old files (present before, not part of this run's new output) ==="
          removed=0
          while IFS= read -r fname; do
            [ -z "$fname" ] && continue
            f="$DIR/$fname"
            status=$(git status --porcelain -- "$f")
            if [[ "$status" != "??"* ]]; then
              if [[ -z "$status" ]]; then
                echo "  $fname"
                removed=$((removed+1))
                if [ "${{ inputs.dry_run }}" = "false" ]; then
                  git rm -q "$f"
                fi
              fi
            fi
          done < /tmp/before_list.txt
          echo "=== Total: $removed orphaned file(s) $([ '${{ inputs.dry_run }}' = 'false' ] && echo 'removed' || echo 'would be removed (dry run)') ==="
      - name: Show what changed
        run: git status --short
      - name: Commit and push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "⚠️ Nothing to commit"
          else
            git commit -m "Regenerate Pitch Black individual card pages with presale EN prices"
            git push origin main
            echo "✅ Committed and pushed"
          fi
