name: Regenerate All Set Pages
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (just print what would happen, generate nothing)'
        required: true
        type: boolean
        default: true
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Regenerate all set pages
        env:
          CF_R2_PUBLIC_URL: ${{ secrets.CF_R2_PUBLIC_URL }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          SCRYDEX_API_KEY: ${{ secrets.SCRYDEX_API_KEY }}
          SCRYDEX_TEAM_ID: ${{ secrets.SCRYDEX_TEAM_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/regenerate-all-set-pages.js --dry-run
          else
            node scripts/regenerate-all-set-pages.js
          fi
      - name: Commit and push
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "⚠️ Nothing to commit"
          else
            git commit -m "Bulk regenerate all Pokemon set pages"
            git push origin main
            echo "✅ Committed and pushed"
          fi
