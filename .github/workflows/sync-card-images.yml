name: Sync Card Images to R2

on:
  workflow_dispatch:
    inputs:
      set_id:
        description: 'TCG Set ID (e.g. sv1, sv2, sv3)'
        required: true
        default: 'sv1'

jobs:
  sync-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @aws-sdk/client-s3 node-fetch

      - name: Download and upload card images
        env:
          SET_ID: ${{ github.event.inputs.set_id }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
        run: node scripts/sync-images.js
