name: Sync Card Images to R2

on:
  workflow_dispatch:
    inputs:
      set_id:
        description: 'TCGdex Set ID (sv01=SV Base, sv02=Paldea Evolved, sv03=Obsidian Flames...)'
        required: true
        default: 'sv01'

jobs:
  sync-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @aws-sdk/client-s3

      - name: Download and upload card images
        env:
          SET_ID: ${{ github.event.inputs.set_id }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_R2_PUBLIC_URL: ${{ secrets.CF_R2_PUBLIC_URL }}
        run: node scripts/sync-images.js
