# .github/workflows/patch-html.yml
name: Patch HTML files

on:
  push:
    branches: [main]
    paths:
      - 'patch-html-files.js'
      - '*-card-list.html'

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run patches
        run: node patch-html-files.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *-card-list.html set-template.html
          git diff --staged --quiet && echo "Nothing to patch" && exit 0
          git commit -m "Auto-patch HTML files"
          git push
