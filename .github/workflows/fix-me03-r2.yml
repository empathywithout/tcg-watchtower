name: Fix ME03 R2 Data

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @aws-sdk/client-s3

      - name: Fix me03 R2 data and logo
        env:
          SCRYDEX_API_KEY: ${{ secrets.SCRYDEX_API_KEY }}
          SCRYDEX_TEAM_ID: ${{ secrets.SCRYDEX_TEAM_ID }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
        run: node scripts/fix-me03-r2.mjs
