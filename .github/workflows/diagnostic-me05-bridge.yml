name: Diagnostic - me05 Bridge Check (Read-Only)
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run diagnostic (read-only, no writes anywhere)
        env:
          SCRYDEX_API_KEY: ${{ secrets.SCRYDEX_API_KEY }}
          SCRYDEX_TEAM_ID: ${{ secrets.SCRYDEX_TEAM_ID }}
        run: node scripts/diagnostic-me05-bridge-check.js
