name: Pinterest Pin Campaign

on:
  workflow_dispatch:  # manual trigger only for now, from the Actions tab
    inputs:
      live:
        description: 'Actually post to Pinterest (unchecked = dry run, safe)'
        required: true
        type: boolean
        default: false

jobs:
  pinterest-campaign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow

      - name: List boards (verify token + get board IDs)
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
        run: python3 scripts/pinterest_list_boards.py

      - name: Run campaign
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_CHASE_CARDS: ${{ secrets.PINTEREST_BOARD_CHASE_CARDS }}
          PINTEREST_BOARD_PITCH_BLACK: ${{ secrets.PINTEREST_BOARD_PITCH_BLACK }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_R2_PUBLIC_URL: ${{ secrets.CF_R2_PUBLIC_URL }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: |
          if [ "${{ inputs.live }}" = "true" ]; then
            python3 scripts/pinterest_campaign.py --live
          else
            python3 scripts/pinterest_campaign.py
          fi

      - name: Upload generated pin images for inspection
        uses: actions/upload-artifact@v4
        with:
          name: pinterest-pins
          path: /tmp/pinterest_pins/*.png
