name: Test Full Video Pipeline

on:
  workflow_dispatch:  # manual trigger only, from the Actions tab

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-texttospeech Pillow

      - name: Verify ffmpeg is available
        run: ffmpeg -version

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_TTS_KEY }}' > /tmp/gcp-key.json

      - name: Run full pipeline test (narration + frames + assembly)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: python3 scripts/test_full_pipeline.py

      - name: Upload sample video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-video
          path: /tmp/pipeline_test/sample_video.mp4

      - name: Upload individual frames for inspection
        uses: actions/upload-artifact@v4
        with:
          name: sample-frames
          path: /tmp/pipeline_test/frames/*.png
